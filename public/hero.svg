<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Decorative wedding mandap and floral motif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a121c"/>
      <stop offset="0.55" stop-color="#3c1b22"/>
      <stop offset="1" stop-color="#180a10"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <g id="bloom">
      <circle r="5" fill="#e7c39a"/>
      <g fill="none" stroke="#d4af37" stroke-width="2.2" stroke-linecap="round">
        <path d="M0 -6 C 9 -16, 9 -30, 0 -38 C -9 -30, -9 -16, 0 -6 Z"/>
        <path d="M0 -6 C 9 -16, 9 -30, 0 -38 C -9 -30, -9 -16, 0 -6 Z" transform="rotate(72)"/>
        <path d="M0 -6 C 9 -16, 9 -30, 0 -38 C -9 -30, -9 -16, 0 -6 Z" transform="rotate(144)"/>
        <path d="M0 -6 C 9 -16, 9 -30, 0 -38 C -9 -30, -9 -16, 0 -6 Z" transform="rotate(216)"/>
        <path d="M0 -6 C 9 -16, 9 -30, 0 -38 C -9 -30, -9 -16, 0 -6 Z" transform="rotate(288)"/>
      </g>
    </g>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <!-- mandap arch + pillars -->
  <g fill="none" stroke="#d4af37" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round">
    <path d="M360 1000 L360 360 Q360 150 800 150 Q1240 150 1240 360 L1240 1000"/>
    <path d="M430 1000 L430 380 Q430 235 800 235 Q1170 235 1170 380 L1170 1000" stroke-opacity="0.35"/>
    <!-- scalloped inner arch (toran) -->
    <path d="M430 392
             q41 46 82 0 q41 46 82 0 q41 46 82 0 q41 46 82 0
             q41 46 82 0 q41 46 82 0 q41 46 82 0 q41 46 82 0
             q41 46 74 4" stroke-opacity="0.45"/>
  </g>

  <!-- hanging garland strands -->
  <g stroke="#e7c39a" stroke-opacity="0.4" stroke-width="1.6">
    <line x1="560" y1="250" x2="560" y2="430"/>
    <line x1="800" y1="180" x2="800" y2="470"/>
    <line x1="1040" y1="250" x2="1040" y2="430"/>
  </g>

  <!-- blooms along arch and as falling petals -->
  <g opacity="0.85">
    <use href="#bloom" x="430" y="392"/>
    <use href="#bloom" x="800" y="238"/>
    <use href="#bloom" x="1170" y="392"/>
    <use href="#bloom" x="560" y="300" transform="scale(0.8)" style="transform-box: fill-box"/>
    <use href="#bloom" x="1040" y="300"/>
    <use href="#bloom" x="360" y="560"/>
    <use href="#bloom" x="1240" y="560"/>
  </g>

  <!-- scattered petals -->
  <g fill="#d4af37" fill-opacity="0.5">
    <circle cx="250" cy="700" r="4"/>
    <circle cx="320" cy="820" r="3"/>
    <circle cx="700" cy="640" r="3"/>
    <circle cx="900" cy="700" r="4"/>
    <circle cx="1330" cy="690" r="4"/>
    <circle cx="1280" cy="820" r="3"/>
    <circle cx="1120" cy="650" r="3"/>
    <circle cx="480" cy="660" r="3"/>
  </g>
</svg>
